services:
  postgres:
    image: postgres:16-alpine
    container_name: inspecciones-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inspecciones
      POSTGRES_USER: inspecciones
      POSTGRES_PASSWORD: inspecciones-dev-only
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inspecciones -d inspecciones"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
